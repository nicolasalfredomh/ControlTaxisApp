# fly.toml app configuration file generated for controltaxisapp on 2026-07-04T12:58:21-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'controltaxisapp'
primary_region = 'lax'

[build]
  dockerfile = "Dockerfile"
  
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048

  [mounts]
  source = "data_volume"
  destination = "/app/data"
